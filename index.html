<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #00a651;
    --verde-dark: #007a3d;
    --verde-light: #39d676;
    --verde-glow: rgba(0,166,81,0.35);
    --navy: #0a1628;
    --navy2: #111f3a;
    --white: #f5fff8;
    --gray: #8fa8a0;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(0,166,81,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,166,81,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 100% 80%, rgba(0,120,60,0.15) 0%, transparent 60%),
      linear-gradient(170deg, #0a1628 0%, #0d1f3c 60%, #071510 100%);
    pointer-events:none;
  }

  .bubble {
    position:fixed; border-radius:50%; pointer-events:none; z-index:0;
    background: radial-gradient(circle, rgba(0,166,81,0.12) 0%, transparent 70%);
    animation: floatBubble linear infinite;
  }
  .b1{width:300px;height:300px;left:-80px;top:10%;animation-duration:18s;}
  .b2{width:200px;height:200px;right:-50px;top:40%;animation-duration:24s;animation-delay:-8s;}
  .b3{width:150px;height:150px;left:30%;bottom:5%;animation-duration:20s;animation-delay:-4s;}
  @keyframes floatBubble {
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-30px) scale(1.05);}
  }

  .wrap { position:relative; z-index:1; max-width:480px; margin:0 auto; padding: 0 0 100px; }

  #pwa-banner {
    display:none;
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:9999; width:calc(100% - 32px); max-width:440px;
    background: linear-gradient(135deg, #0d2b14, #0a1628);
    border: 1.5px solid rgba(0,166,81,0.5);
    border-radius:18px; padding:14px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    align-items:center; gap:12px;
    animation: slideUp .4s ease;
  }
  #pwa-banner.visible { display:flex; }
  @keyframes slideUp { from{transform:translateX(-50%) translateY(40px);opacity:0;} to{transform:translateX(-50%) translateY(0);opacity:1;} }
  
  header { padding: 28px 24px 0; display:flex; flex-direction:column; align-items:center; text-align:center; }
  .sena-badge { display:flex; align-items:center; gap:10px; background: rgba(0,166,81,0.12); border: 1.5px solid rgba(0,166,81,0.35); border-radius:50px; padding: 6px 18px 6px 10px; margin-bottom:18px; animation: fadeDown .6s ease both; }
  .sena-badge svg { width:32px; height:32px; }
  .sena-badge span { font-family:'Bebas Neue'; font-size:1.5rem; letter-spacing:3px; color: var(--verde-light); }
  .header-title { font-family:'Bebas Neue'; font-size: clamp(2.8rem, 12vw, 4rem); line-height:0.95; letter-spacing:2px; color: var(--white); animation: fadeDown .7s .1s ease both; }
  .header-title em { font-style:normal; color: var(--verde); text-shadow: 0 0 30px var(--verde-glow); }
  .header-sub { margin-top:8px; font-size:.85rem; font-weight:600; letter-spacing:3px; text-transform:uppercase; color: var(--gray); animation: fadeDown .7s .2s ease both; }

  .countdown-card {
    margin: 28px 16px 0; border-radius:24px; padding: 28px 24px;
    background: linear-gradient(135deg, rgba(0,166,81,0.14) 0%, rgba(0,80,40,0.1) 100%);
    border: 1.5px solid rgba(0,166,81,0.3); backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.3); animation: fadeUp .6s .3s ease both; position:relative; overflow:hidden;
  }
  .cd-blocks { display:flex; gap:10px; justify-content:center; margin-bottom:16px; }
  .cd-block { flex:1; background:rgba(0,0,0,0.35); border:1px solid rgba(0,166,81,0.25); border-radius:16px; padding:14px 8px; display:flex; flex-direction:column; align-items:center; }
  .cd-num { font-family:'Bebas Neue'; font-size:2.8rem; line-height:1; color: var(--verde-light); }
  .cd-unit { font-size:.65rem; font-weight:700; color: var(--gray); margin-top:4px; }

  .horario-card { display:flex; border-radius:18px; margin-bottom:10px; background: var(--card-bg); border: 1.5px solid var(--card-border); transition: transform .2s; }
  .horario-card.active-salida { border-color: var(--verde); box-shadow: 0 0 15px var(--verde-glow); }
  .hc-body { flex:1; padding:14px 16px; }
  .hc-time { font-family:'Bebas Neue'; font-size:2rem; color:#fff; }
  .hc-tag { display:inline-block; font-size:.68rem; font-weight:800; padding:2px 8px; border-radius:20px; background: rgba(0,166,81,0.2); color:var(--verde-light); }

  .stop-row { display:flex; gap:0; position:relative; }
  .stop-spine { display:flex; flex-direction:column; align-items:center; width:44px; }
  .stop-num { width:28px; height:28px; border-radius:50%; background: var(--verde); display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:900; z-index:1; }
  .stop-line { width:2px; background: rgba(0,166,81,0.3); flex:1; }
  .stop-info { flex:1; padding: 3px 0 22px 10px; }

  footer { margin-top: 40px; text-align:center; padding:20px; border-top: 1px solid rgba(0,166,81,0.12); }
  .footer-dev { font-size:.72rem; color:rgba(255,255,255,0.25); }
  .footer-dev strong { color:var(--verde); }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>

<div class="bubble b1"></div>
<div class="bubble b2"></div>

<div id="pwa-banner">
  <div class="pb-text"><strong>Instalar App</strong><span>Acceso directo y modo offline</span></div>
  <button class="pb-btn" id="pwa-install-btn" style="background:var(--verde);border:none;padding:8px 15px;border-radius:20px;color:#fff;font-weight:bold;">Instalar</button>
</div>

<div class="wrap">
  <header>
    <div class="sena-badge">
      <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#00a651"/><text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Bebas Neue" font-size="14" fill="white">SENA</text></svg>
      <span>CTPGA</span>
    </div>
    <h1 class="header-title">RUTA <em>DEL BUS</em></h1>
    <p class="header-sub">Transporte Aprendices · Caucasia</p>
  </header>

  <div class="countdown-card">
    <div class="cd-salida-name" id="cd-salida-name" style="text-align:center; margin-bottom:10px; font-weight:bold;">Cargando...</div>
    <div class="cd-blocks">
      <div class="cd-block"><div class="cd-num" id="cd-h">00</div><div class="cd-unit">Horas</div></div>
      <div class="cd-block"><div class="cd-num" id="cd-m">00</div><div class="cd-unit">Min</div></div>
      <div class="cd-block"><div class="cd-num" id="cd-s">00</div><div class="cd-unit">Seg</div></div>
    </div>
  </div>

  <div style="padding:0 16px; margin-top:25px;">
    <h3 style="font-family:'Bebas Neue'; color:var(--gray); margin-bottom:10px;">🕐 Horarios</h3>
    <div id="card-s1" class="horario-card"><div class="hc-body"><div class="hc-tag">Mañana</div><div class="hc-time">6:00 AM</div></div></div>
    <div id="card-s2" class="horario-card"><div class="hc-body"><div class="hc-tag">Mediodía</div><div class="hc-time">11:30 AM</div></div></div>
    <div id="card-s3" class="horario-card"><div class="hc-body"><div class="hc-tag">Tarde</div><div class="hc-time">5:30 PM</div></div></div>
  </div>

  <div style="padding:0 16px; margin-top:25px;">
    <h3 style="font-family:'Bebas Neue'; color:var(--gray); margin-bottom:10px;">📍 Paradas</h3>
    <div id="stops-list"></div>
  </div>

  <footer>
    <p class="footer-dev">Desarrollada por <strong>Vibras Positivas HM</strong> — © 2026</p>
  </footer>
</div>

<script>
const paradas = ["Frente Cementerio", "Éxito", "Entrada UdeA", "Corazón de Jesús", "Semáforo la 10", "Ara Asovivienda", "Bahía Coliseo", "Villa Arabia", "Ara Malvinas", "Hda. La Uribe"];
const stopsList = document.getElementById('stops-list');
paradas.forEach((p, i) => {
  stopsList.innerHTML += `<div class="stop-row"><div class="stop-spine"><div class="stop-num">${i+1}</div><div class="stop-line"></div></div><div class="stop-info"><div class="stop-name">${p}</div></div></div>`;
});

const SALIDAS = [
  { id:'s1', min: 6*60, nombre:'6:00 AM', card:'card-s1' },
  { id:'s2', min: 11*60+30, nombre:'11:30 AM', card:'card-s2' },
  { id:'s3', min: 17*60+30, nombre:'5:30 PM', card:'card-s3' },
];

function updateCountdown() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const col = new Date(utc - 5 * 3600000);
  const minNow = col.getHours() * 60 + col.getMinutes();

  let proxima = SALIDAS.find(s => s.min > minNow);
  
  SALIDAS.forEach(s => document.getElementById(s.card).classList.remove('active-salida'));

  if (!proxima) {
    document.getElementById('cd-salida-name').textContent = "No hay más rutas hoy";
    return;
  }

  document.getElementById(proxima.card).classList.add('active-salida');
  document.getElementById('cd-salida-name').textContent = "Próxima salida: " + proxima.nombre;

  let diff = (proxima.min * 60) - (col.getHours()*3600 + col.getMinutes()*60 + col.getSeconds());
  document.getElementById('cd-h').textContent = String(Math.floor(diff / 3600)).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(Math.floor((diff % 3600) / 60)).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(diff % 60).padStart(2,'0');
}

setInterval(updateCountdown, 1000);
updateCountdown();

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('pwa-banner').style.display = 'flex';
});

document.getElementById('pwa-install-btn').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    document.getElementById('pwa-banner').style.display = 'none';
  }
});
</script>
</body>
</html>
